services:

  # ─────────────────────────────────────────
  # PostgreSQL 16
  # ─────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: pmcopilot-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    networks:
      - pmcopilot-net
    restart: unless-stopped

  # ─────────────────────────────────────────
  # ChromaDB
  # ─────────────────────────────────────────
  chromadb:
    image: chromadb/chroma:latest
    container_name: pmcopilot-chroma
    environment:
      ANONYMIZED_TELEMETRY: "false"
    ports:
      - "8001:8000"
    volumes:
      - chroma_data:/chroma/chroma
    networks:
      - pmcopilot-net
    restart: unless-stopped

  # ─────────────────────────────────────────
  # pgAdmin  (arranca solo con: make tools-up)
  # ─────────────────────────────────────────
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: pmcopilot-pgadmin
    profiles: ["tools"]
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_EMAIL}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD}
    ports:
      - "5050:80"
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    networks:
      - pmcopilot-net
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

# ─────────────────────────────────────────
networks:
  pmcopilot-net:
    driver: bridge

volumes:
  postgres_data:
  chroma_data:
  pgadmin_data:
